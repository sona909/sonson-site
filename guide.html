<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>Sonson Sneakers Store</title>
    <style>
        body {
            background-color: #f1f5f9;
            color: #1e293b;
            font-family: sans-serif;
            margin: 0;
            padding: 50px 20px;
            display: flex;
            justify-content: center;
        }
        .product-card {
            width: 400px;
            background-color: #ffffff;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            text-align: center;
        }
        .tag {
            display: inline-block;
            background-color: #ff6b35;
            color: white;
            padding: 5px 15px;
            font-size: 12px;
            font-weight: bold;
            border-radius: 20px;
            text-transform: uppercase;
        }
        .product-title {
            font-size: 24px;
            margin: 15px 0 5px 0;
            color: #0f172a;
        }
        .price {
            font-size: 22px;
            color: #ff6b35;
            font-weight: bold;
            margin-bottom: 15px;
        }
        .description {
            color: #64748b;
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 25px;
        }
        .btn-buy {
            display: block;
            background-color: #0f172a;
            color: white;
            padding: 15px;
            text-decoration: none;
            font-weight: bold;
            border-radius: 8px;
            transition: 0.3s;
        }
        .btn-buy:hover {
            background-color: #ff6b35;
        }
    </style>
</head>
<body>

    <div class="product-card">
        <span class="tag">New Arrival</span>
        <h2 class="product-title">Nike Air Max Style</h2>
        <div class="price">$120.00</div>
        <p class="description">حذاء رياضي عصري مريح جداً للمشي والجري، مصمم بأحدث التقنيات لضمان راحة القدمين مع ستايل كول وجريء يناسب كل خروجاتك.</p>
        <a href="#" class="btn-buy">اشتري الآن</a>
    </div>

</body>
</html>
